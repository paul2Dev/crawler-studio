<!doctype html>
<html lang="ro">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crawler Studio</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffdfa;
            --line: #ddd4c6;
            --ink: #1f1d1a;
            --muted: #6a665f;
            --brand: #0f766e;
            --brand-2: #115e59;
            --danger: #991b1b;
            --warn: #92400e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 10%, #fde68a 0%, transparent 28%),
                radial-gradient(circle at 90% 90%, #a7f3d0 0%, transparent 36%),
                var(--bg);
        }

        main {
            width: min(1040px, 94vw);
            margin: 24px auto;
            display: grid;
            gap: 16px;
            animation: in .45s ease;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 16px 30px rgba(17, 24, 39, .06);
        }

        h1 {
            margin: 0 0 6px;
            font-size: clamp(1.45rem, 2.8vw, 2.15rem);
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.45;
        }

        form {
            margin-top: 14px;
            display: grid;
            gap: 12px;
        }

        .grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        label {
            display: grid;
            gap: 6px;
            font-size: 0.93rem;
        }

        input[type="url"],
        input[type="number"],
        select {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.96rem;
            background: #fff;
            color: var(--ink);
        }

        .checks {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .checks label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.92rem;
        }

        button {
            width: fit-content;
            border: 0;
            border-radius: 12px;
            padding: 11px 14px;
            background: linear-gradient(120deg, var(--brand), var(--brand-2));
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform .15s ease, box-shadow .2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(15, 118, 110, .25);
        }

        button:disabled {
            opacity: .55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            margin-bottom: 10px;
            font-size: .96rem;
            color: var(--muted);
        }

        .result {
            min-height: 22px;
            margin-bottom: 10px;
        }

        .result-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .stats {
            margin: 10px 0 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f9f7f2;
            padding: 10px;
            font-size: .91rem;
            color: #333;
            display: none;
        }

        .stats h3 {
            margin: 0 0 10px;
            font-size: .98rem;
            color: #3f3a33;
        }

        .audit-panel {
            margin: 10px 0 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f7f4ee;
            padding: 12px;
            display: none;
        }

        .audit-panel h3 {
            margin: 0 0 10px;
            font-size: .98rem;
        }

        .audit-table {
            width: 100%;
            border-collapse: collapse;
            background: #fffdf8;
            border: 1px solid #ded5c7;
            border-radius: 10px;
            overflow: hidden;
        }

        .audit-table-wrap {
            overflow-x: auto;
        }

        .audit-table th,
        .audit-table td {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid #ece2d3;
            font-size: .85rem;
            vertical-align: top;
        }

        .audit-table th {
            background: #f2eadf;
            color: #4b443a;
            font-weight: 700;
        }

        .audit-table tr:last-child td {
            border-bottom: 0;
        }

        .audit-count {
            font-size: .98rem;
            font-weight: 700;
            color: #3f3a33;
            white-space: nowrap;
        }

        .audit-count-btn {
            border: 1px solid #a7b7b0;
            background: #f0fbf8;
            color: #145a4f;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            min-width: 52px;
            text-align: center;
        }

        .audit-count-btn:hover {
            background: #ddf3ee;
        }

        .audit-count-btn.active {
            border-color: #0f766e;
            background: #c9efe6;
            color: #0f524c;
        }

        .audit-detail {
            margin-top: 10px;
            border: 1px solid #ded5c7;
            border-radius: 10px;
            background: #fffdf8;
            padding: 10px;
            display: none;
        }

        .audit-detail h4 {
            margin: 0 0 8px;
            font-size: .92rem;
            color: #3f3a33;
        }

        .audit-detail-empty {
            color: #5f5a52;
            font-size: .84rem;
        }

        .audit-legend {
            margin-top: 8px;
            font-size: .8rem;
            color: #5b5449;
        }

        .hint {
            margin-top: -2px;
            font-size: .82rem;
            color: #5f5a52;
        }

        .mode-badge {
            display: inline-block;
            margin-left: 6px;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px solid #b6b6b6;
            background: #f4f4f4;
            color: #595959;
            font-size: .74rem;
            font-weight: 700;
            letter-spacing: .2px;
            vertical-align: middle;
        }

        .mode-badge.active {
            border-color: #80c7b4;
            background: #e9fff7;
            color: #0f6b53;
        }

        .saved {
            margin-top: 12px;
            border-top: 1px dashed #dbcdb7;
            padding-top: 12px;
        }

        .saved h3 {
            margin: 0 0 8px;
            font-size: 1rem;
        }

        .saved ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 6px;
        }

        .saved li {
            font-size: .9rem;
            color: #433f39;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .missing-index {
            color: #8a5a1c;
            font-size: .8rem;
            padding: 2px 6px;
            border: 1px solid #e7c58f;
            border-radius: 999px;
            background: #fff6e8;
        }

        .run-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .delete-btn {
            border: 1px solid #d8a2a2;
            background: #fff7f7;
            color: #8d1f1f;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: .78rem;
            font-weight: 700;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: #ffeaea;
        }

        .zip-btn {
            border: 1px solid #8bbcb7;
            background: #effcf8;
            color: #0f6b53;
            border-radius: 8px;
            padding: 4px 8px;
            font-size: .78rem;
            font-weight: 700;
            text-decoration: none;
        }

        .zip-btn:hover {
            background: #ddf7ef;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .ghost {
            background: #fff;
            color: #0f766e;
            border: 1px solid #79b8b3;
        }

        .logs {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 340px;
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #faf8f3;
        }

        .logs li {
            padding: 8px 10px;
            border-bottom: 1px dashed #e9dfd0;
            font-size: .88rem;
            font-family: Consolas, "Courier New", monospace;
        }

        .logs li:last-child {
            border-bottom: 0;
        }

        .logs .warn {
            color: var(--warn);
        }

        .logs .error {
            color: var(--danger);
        }

        a {
            color: #9a3412;
        }

        @keyframes in {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 760px) {
            .grid {
                grid-template-columns: 1fr;
            }

            main {
                margin: 16px auto;
            }

            .audit-table th,
            .audit-table td {
                font-size: .8rem;
                padding: 7px 8px;
            }
        }
    </style>
</head>

<body>
    <main>
        <section class="card">
            <h1>Crawler Studio</h1>
            <p>Introdu site-ul, porneste crawler-ul si descarca local pagini + asset-uri. Setarile implicite sunt
                conservatoare pentru a reduce riscul de blocare.</p>

            <form id="crawl-form">
                <label>
                    URL website
                    <input id="targetUrl" type="url" placeholder="https://example.com" required />
                </label>

                <div class="grid">
                    <label>Max pagini<input id="maxPages" type="number" min="1" max="2000" value="150" /></label>
                    <label>Max depth<input id="maxDepth" type="number" min="1" max="12" value="3" /></label>
                    <label title="Sweetspot recomandat: 700-1500ms. Pentru site-uri sensibile: 1500-4000ms.">Delay minim
                        (ms)<input id="delayMinMs" type="number" min="700" max="10000" value="700" /></label>
                    <label title="Pastreaza un jitter real intre min si max (cel putin 300ms).">Delay maxim (ms)<input
                            id="delayMaxMs" type="number" min="1500" max="15000" value="1500" /></label>
                </div>
                <div class="hint">Prag minim fortat: Delay minim >= 700ms, Delay maxim >= 1500ms.</div>

                <div class="checks">
                    <label><input id="respectRobots" type="checkbox" checked />Respecta robots.txt</label>
                    <label><input id="saveExternalAssets" type="checkbox" />Include asset-uri externe</label>
                    <label><input id="notifySound" type="checkbox" checked />Sunet la final job</label>
                    <label>
                        Volum notificare
                        <select id="notifyVolume">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </label>
                    <label><input id="singlePage" type="checkbox" />Doar pagina curenta (fara crawl linkuri)<span
                            id="singlePageBadge" class="mode-badge">INACTIVE</span></label>
                </div>

                <div class="actions">
                    <button id="crawlBtn" type="submit">Start Crawl</button>
                    <button id="dryRunBtn" type="button" class="ghost">Dry Run Statistici</button>
                    <button id="applyRecBtn" type="button" class="ghost" style="display:none;">Aplica
                        recomandari</button>
                    <button id="stopBtn" type="button" class="ghost"
                        style="display:none; border-color:#d29d9d; color:#8d1f1f;">Stop job activ</button>
                </div>
            </form>
        </section>

        <section class="card">
            <div class="status" id="status">Niciun job activ.</div>
            <div class="result-row">
                <div class="result" id="result"></div>
                <button id="copyLogBtn" type="button" class="ghost" style="display:none;">Copy Log</button>
                <button id="exportLinksBtn" type="button" class="ghost" style="display:none;">Export linkuri
                    gasite</button>
            </div>
            <div class="stats" id="dryStats"></div>
            <div class="audit-panel" id="auditPanel"></div>
            <ul class="logs" id="logs"></ul>
            <div class="saved">
                <h3>Arhive salvate</h3>
                <ul id="savedRuns"></ul>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById('crawl-form');
        const crawlBtn = document.getElementById('crawlBtn');
        const dryRunBtn = document.getElementById('dryRunBtn');
        const applyRecBtn = document.getElementById('applyRecBtn');
        const copyLogBtn = document.getElementById('copyLogBtn');
        const exportLinksBtn = document.getElementById('exportLinksBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        const dryStatsEl = document.getElementById('dryStats');
        const auditPanelEl = document.getElementById('auditPanel');
        const logsEl = document.getElementById('logs');
        const savedRunsEl = document.getElementById('savedRuns');
        const delayMinInput = document.getElementById('delayMinMs');
        const delayMaxInput = document.getElementById('delayMaxMs');
        const notifySoundInput = document.getElementById('notifySound');
        const notifyVolumeInput = document.getElementById('notifyVolume');
        const singlePageInput = document.getElementById('singlePage');
        const singlePageBadge = document.getElementById('singlePageBadge');
        const SOUND_PREF_KEY = 'crawlerStudio.notifySound';
        const SOUND_VOLUME_PREF_KEY = 'crawlerStudio.notifyVolume';
        let latestRecommendations = null;
        let latestDryRunLinks = [];
        let latestDryRunStartUrl = '';
        let selectedAuditCategory = 'missingAssets';
        let selectionHoldUntil = 0;
        let lastJobSnapshot = null;
        let audioContext = null;

        function nowMs() {
            return Date.now();
        }

        function bumpSelectionHold(extraMs = 2500) {
            selectionHoldUntil = Math.max(selectionHoldUntil, nowMs() + extraMs);
        }

        function hasSelectionInside(container) {
            const sel = window.getSelection ? window.getSelection() : null;
            if (!sel || sel.rangeCount === 0) return false;
            if (!String(sel).trim()) return false;

            const anchor = sel.anchorNode;
            const focus = sel.focusNode;
            const containsNode = (node) => {
                if (!node || !container) return false;
                return container.contains(node.nodeType === Node.TEXT_NODE ? node.parentElement : node);
            };

            return containsNode(anchor) || containsNode(focus);
        }

        function shouldPauseAutoRerender() {
            if (nowMs() < selectionHoldUntil) return true;
            return hasSelectionInside(logsEl) || hasSelectionInside(auditPanelEl);
        }

        const CRAWL_DELAY_MIN_RECOMMENDED = 700;
        const CRAWL_DELAY_MAX_RECOMMENDED = 1500;

        function validateCrawlDelays(min, max) {
            if (!Number.isFinite(min) || !Number.isFinite(max)) {
                return 'Delay minim si delay maxim trebuie sa fie numere valide.';
            }
            if (min < CRAWL_DELAY_MIN_RECOMMENDED) {
                return `Delay minim trebuie sa fie cel putin ${CRAWL_DELAY_MIN_RECOMMENDED}ms.`;
            }
            if (max < CRAWL_DELAY_MAX_RECOMMENDED) {
                return `Delay maxim trebuie sa fie cel putin ${CRAWL_DELAY_MAX_RECOMMENDED}ms.`;
            }
            if (max < min) {
                return 'Delay maxim nu poate fi mai mic decat delay minim.';
            }
            return null;
        }

        function payloadFromForm() {
            return {
                targetUrl: document.getElementById('targetUrl').value.trim(),
                maxPages: Number(document.getElementById('maxPages').value),
                maxDepth: Number(document.getElementById('maxDepth').value),
                delayMinMs: Number(document.getElementById('delayMinMs').value),
                delayMaxMs: Number(document.getElementById('delayMaxMs').value),
                respectRobots: document.getElementById('respectRobots').checked,
                saveExternalAssets: document.getElementById('saveExternalAssets').checked,
                singlePage: singlePageInput.checked,
            };
        }

        function loadSoundPreference() {
            const saved = localStorage.getItem(SOUND_PREF_KEY);
            if (saved === null) {
                notifySoundInput.checked = true;
            } else {
                notifySoundInput.checked = saved === '1';
            }

            const savedVolume = localStorage.getItem(SOUND_VOLUME_PREF_KEY);
            notifyVolumeInput.value = ['low', 'medium', 'high'].includes(savedVolume)
                ? savedVolume
                : 'medium';
        }

        function saveSoundPreference() {
            localStorage.setItem(SOUND_PREF_KEY, notifySoundInput.checked ? '1' : '0');
            localStorage.setItem(SOUND_VOLUME_PREF_KEY, notifyVolumeInput.value);
        }

        function volumeScale() {
            if (notifyVolumeInput.value === 'low') return 0.75;
            if (notifyVolumeInput.value === 'high') return 2.8;
            return 1.0;
        }

        function getAudioContext() {
            if (audioContext) {
                return audioContext;
            }

            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) {
                return null;
            }

            audioContext = new Ctx();
            return audioContext;
        }

        function primeAudioContext() {
            const ctx = getAudioContext();
            if (!ctx) return;
            if (ctx.state === 'suspended') {
                ctx.resume().catch(() => { });
            }
        }

        function scheduleTone(ctx, frequency, startTime, durationSec, gainValue, waveType = 'square') {
            const mainOsc = ctx.createOscillator();
            const mainGain = ctx.createGain();
            const overtoneOsc = ctx.createOscillator();
            const overtoneGain = ctx.createGain();

            const safeGain = Math.min(0.28, Math.max(0.01, gainValue));

            mainOsc.type = waveType;
            mainOsc.frequency.setValueAtTime(frequency, startTime);
            mainGain.gain.setValueAtTime(0.0001, startTime);
            mainGain.gain.exponentialRampToValueAtTime(safeGain, startTime + 0.01);
            mainGain.gain.exponentialRampToValueAtTime(0.0001, startTime + durationSec);

            overtoneOsc.type = 'triangle';
            overtoneOsc.frequency.setValueAtTime(frequency * 2, startTime);
            overtoneGain.gain.setValueAtTime(0.0001, startTime);
            overtoneGain.gain.exponentialRampToValueAtTime(safeGain * 0.35, startTime + 0.01);
            overtoneGain.gain.exponentialRampToValueAtTime(0.0001, startTime + durationSec);

            mainOsc.connect(mainGain);
            overtoneOsc.connect(overtoneGain);
            mainGain.connect(ctx.destination);
            overtoneGain.connect(ctx.destination);

            mainOsc.start(startTime);
            overtoneOsc.start(startTime);
            mainOsc.stop(startTime + durationSec + 0.02);
            overtoneOsc.stop(startTime + durationSec + 0.02);
        }

        function playJobFinishedSound(job) {
            if (!notifySoundInput.checked) return;

            const ctx = getAudioContext();
            if (!ctx) return;
            if (ctx.state === 'suspended') {
                ctx.resume().catch(() => { });
            }

            const status = String(job?.status || '');
            const mode = String(job?.mode || 'crawl');
            const t0 = ctx.currentTime + 0.03;
            const scale = volumeScale();
            const repeatOffset = 0.55;

            if (status === 'completed') {
                if (mode === 'dry-run') {
                    scheduleTone(ctx, 880, t0, 0.11, 0.07 * scale, 'square');
                    scheduleTone(ctx, 1174.66, t0 + 0.13, 0.12, 0.085 * scale, 'square');
                    scheduleTone(ctx, 1318.51, t0 + 0.28, 0.16, 0.095 * scale, 'square');
                    scheduleTone(ctx, 880, t0 + repeatOffset, 0.11, 0.07 * scale, 'square');
                    scheduleTone(ctx, 1174.66, t0 + repeatOffset + 0.13, 0.12, 0.085 * scale, 'square');
                    scheduleTone(ctx, 1318.51, t0 + repeatOffset + 0.28, 0.16, 0.095 * scale, 'square');
                } else {
                    scheduleTone(ctx, 659.25, t0, 0.1, 0.075 * scale, 'square');
                    scheduleTone(ctx, 987.77, t0 + 0.12, 0.11, 0.09 * scale, 'square');
                    scheduleTone(ctx, 1318.51, t0 + 0.25, 0.19, 0.105 * scale, 'square');
                    scheduleTone(ctx, 659.25, t0 + repeatOffset, 0.1, 0.075 * scale, 'square');
                    scheduleTone(ctx, 987.77, t0 + repeatOffset + 0.12, 0.11, 0.09 * scale, 'square');
                    scheduleTone(ctx, 1318.51, t0 + repeatOffset + 0.25, 0.19, 0.105 * scale, 'square');
                }
                return;
            }

            if (status === 'failed' || status === 'stopped') {
                scheduleTone(ctx, 392, t0, 0.14, 0.085 * scale, 'sawtooth');
                scheduleTone(ctx, 293.66, t0 + 0.16, 0.18, 0.1 * scale, 'sawtooth');
                scheduleTone(ctx, 392, t0 + repeatOffset, 0.14, 0.085 * scale, 'sawtooth');
                scheduleTone(ctx, 293.66, t0 + repeatOffset + 0.16, 0.18, 0.1 * scale, 'sawtooth');
            }
        }

        function syncSinglePageBadge() {
            if (singlePageInput.checked) {
                singlePageBadge.textContent = 'ACTIVE';
                singlePageBadge.classList.add('active');
            } else {
                singlePageBadge.textContent = 'INACTIVE';
                singlePageBadge.classList.remove('active');
            }
        }

        function setStartButtonsEnabled(enabled) {
            crawlBtn.disabled = !enabled;
            dryRunBtn.disabled = !enabled;
        }

        async function submitCrawl(payload) {
            const response = await fetch('/api/crawl', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify(payload),
            });

            const data = await response.json();
            if (!response.ok) {
                resultEl.textContent = data.error || 'Nu am putut porni job-ul.';
                setStartButtonsEnabled(true);
                return false;
            }

            statusEl.textContent = payload.singlePage
                ? 'Job single-page pornit...'
                : 'Job crawl pornit...';
            await refreshStatus();
            await refreshSavedRuns();
            return true;
        }

        function renderLogs(logs) {
            logsEl.innerHTML = '';
            for (const log of logs.slice(-120).reverse()) {
                const li = document.createElement('li');
                li.className = log.level || 'info';
                li.textContent = `[${new Date(log.at).toLocaleTimeString()}] ${log.message}`;
                logsEl.appendChild(li);
            }
        }

        function renderDryStats(result) {
            const estimate = result.estimatedCrawlTime || {};
            const avgMin = Number.isFinite(estimate.avgSeconds)
                ? Math.max(1, Math.round(estimate.avgSeconds / 60))
                : '-';
            const rangeMin = (Number.isFinite(estimate.minSeconds) && Number.isFinite(estimate.maxSeconds))
                ? `${Math.max(1, Math.round(estimate.minSeconds / 60))}-${Math.max(1, Math.round(estimate.maxSeconds / 60))} min`
                : '-';
            const dryRunSec = Number.isFinite(result.dryRunDurationMs)
                ? (result.dryRunDurationMs / 1000).toFixed(1)
                : '-';

            dryStatsEl.style.display = 'block';
            dryStatsEl.innerHTML =
                `<h3>Rezultat Dry Run</h3>` +
                `<div class="audit-table-wrap">` +
                `<table class="audit-table" aria-label="Rezultate dry run">` +
                `<thead><tr><th>Indicator</th><th>Ce inseamna</th><th>Valoare</th></tr></thead>` +
                `<tbody>` +
                `<tr><td>Pagini gasite</td><td>Numar total de pagini interne descoperite in scanarea rapida.</td><td class="audit-count">${result.pagesDiscovered}</td></tr>` +
                `<tr><td>Max depth observat</td><td>Cel mai adanc nivel de navigare detectat din pagina de start.</td><td class="audit-count">${result.maxObservedDepth}</td></tr>` +
                `<tr><td>Durata dry run</td><td>Timp efectiv consumat pentru scanarea rapida.</td><td class="audit-count">${dryRunSec} s</td></tr>` +
                `<tr><td>Timp estimat crawl real</td><td>Estimare pentru crawl complet folosind delay-urile reale recomandate.</td><td class="audit-count">~${avgMin} min (${rangeMin})</td></tr>` +
                `</tbody></table></div>` +
                `<div class="audit-legend">Estimarea foloseste delay-uri de crawl reale si un overhead mediu de incarcare pe pagina.</div>`;
        }

        function exportDiscoveredLinks() {
            if (!Array.isArray(latestDryRunLinks) || latestDryRunLinks.length === 0) {
                resultEl.textContent = 'Nu exista linkuri de exportat. Ruleaza intai un dry run.';
                return;
            }

            const host = (() => {
                try {
                    return new URL(latestDryRunStartUrl || latestDryRunLinks[0]).hostname || 'site';
                } catch {
                    return 'site';
                }
            })();

            const lines = [
                `# Dry Run links export`,
                `# Source: ${latestDryRunStartUrl || '-'}`,
                `# Total links: ${latestDryRunLinks.length}`,
                '',
                ...latestDryRunLinks,
            ];

            const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
            const href = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = href;
            a.download = `dry-run-links-${host}-${Date.now()}.txt`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(href);
        }

        async function copyLogsToClipboard() {
            const lines = Array.from(logsEl.querySelectorAll('li')).map((li) => li.textContent || '');
            if (lines.length === 0) {
                resultEl.textContent = 'Nu exista log-uri de copiat in acest moment.';
                return;
            }

            // Logs are rendered newest-first in UI; reverse to copy in chronological order.
            const text = lines.reverse().join('\n');

            try {
                await navigator.clipboard.writeText(text);
                resultEl.textContent = `Log copiat in clipboard (${lines.length} linii).`;
            } catch {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', 'readonly');
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                let copied = false;
                try {
                    copied = document.execCommand('copy');
                } catch {
                    copied = false;
                }
                textarea.remove();
                resultEl.textContent = copied
                    ? `Log copiat in clipboard (${lines.length} linii).`
                    : 'Nu am putut copia log-ul automat. Selecteaza si copiaza manual.';
            }
        }

        function renderAudit(audit, context = {}) {
            if (!audit || !audit.counts) {
                auditPanelEl.style.display = 'none';
                auditPanelEl.innerHTML = '';
                return;
            }

            const escapeHtml = (value) => String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');

            const detailConfig = {
                missingAssets: {
                    label: 'Asset-uri lipsa',
                    columns: [
                        { key: 'pageUrl', label: 'Pagina', preferLocalLink: true },
                        { key: 'assetUrl', label: 'Asset URL' },
                        { key: 'source', label: 'Sursa' },
                        { key: 'reason', label: 'Motiv' },
                    ],
                },
                brokenInternalLinks: {
                    label: 'Linkuri interne rupte',
                    columns: [
                        { key: 'pageUrl', label: 'Pagina', preferLocalLink: true },
                        { key: 'targetUrl', label: 'Target', preferLocalLink: true },
                        { key: 'reason', label: 'Motiv' },
                    ],
                },
                redirects: {
                    label: 'Redirectionari',
                    columns: [
                        { key: 'from', label: 'De la', preferLocalLink: true },
                        { key: 'to', label: 'Catre', preferLocalLink: true },
                    ],
                },
                mimeMismatches: {
                    label: 'MIME mismatch',
                    columns: [
                        { key: 'pageUrl', label: 'Pagina', preferLocalLink: true },
                        { key: 'url', label: 'URL' },
                        { key: 'extension', label: 'Extensie' },
                        { key: 'contentType', label: 'Content-Type primit' },
                        { key: 'expected', label: 'Content-Type asteptat' },
                    ],
                },
            };

            const runHtmlBase = String(context.runHtmlBase || '');
            const startUrl = String(context.startUrl || '');

            const sanitizePathSegment = (segment) => {
                const cleaned = String(segment || '')
                    .replace(/[^a-zA-Z0-9._-]/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^[-.]+|[-.]+$/g, '');
                return cleaned || 'page';
            };

            const toBase64Url = (value) => {
                const bytes = new TextEncoder().encode(String(value || ''));
                let bin = '';
                for (const b of bytes) {
                    bin += String.fromCharCode(b);
                }
                return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
            };

            const htmlFileNameForUrl = (urlString) => {
                let parsed;
                try {
                    parsed = new URL(urlString);
                } catch {
                    return null;
                }

                const cleanPath = parsed.pathname.replace(/\/+$/, '') || '/';
                const querySuffix = parsed.search ? `-${toBase64Url(parsed.search).slice(0, 12)}` : '';

                if (cleanPath === '/') {
                    return `index${querySuffix}.html`;
                }

                const normalized = cleanPath
                    .replace(/^\//, '')
                    .split('/')
                    .filter(Boolean)
                    .map(sanitizePathSegment)
                    .join('-');

                return `${normalized}${querySuffix}.html`;
            };

            const canUseLocalPageLink = (rawUrl) => {
                if (!runHtmlBase || !startUrl) return false;

                let candidate;
                let base;
                try {
                    candidate = new URL(String(rawUrl || ''));
                    base = new URL(startUrl);
                } catch {
                    return false;
                }

                if (!/^https?:$/i.test(candidate.protocol)) return false;
                if (candidate.protocol !== base.protocol || candidate.host !== base.host) return false;

                const extMatch = (candidate.pathname || '').match(/\.([a-z0-9]+)$/i);
                if (extMatch && !['html', 'htm'].includes(String(extMatch[1] || '').toLowerCase())) {
                    return false;
                }

                return true;
            };

            const renderCellValue = (value, column) => {
                const text = Array.isArray(value) ? value.join(', ') : value;
                const raw = String(text ?? '');
                if (column && column.preferLocalLink && canUseLocalPageLink(raw)) {
                    const fileName = htmlFileNameForUrl(raw);
                    if (fileName) {
                        const href = `${runHtmlBase}${fileName}`;
                        return `<a href="${escapeHtml(href)}" target="_blank" rel="noreferrer">${escapeHtml(raw)}</a>`;
                    }
                }
                return escapeHtml(raw);
            };

            const buildDetailTable = (key) => {
                const cfg = detailConfig[key];
                const rows = Array.isArray(audit[key]) ? audit[key] : [];
                if (rows.length === 0) {
                    return `<div class="audit-detail-empty">Nu exista intrari pentru acest indicator.</div>`;
                }

                const head = cfg.columns.map((col) => `<th>${escapeHtml(col.label)}</th>`).join('');
                const body = rows.map((row) => {
                    const tds = cfg.columns.map((col) => {
                        const rawValue = row && Object.prototype.hasOwnProperty.call(row, col.key)
                            ? row[col.key]
                            : '';
                        return `<td>${renderCellValue(rawValue, col)}</td>`;
                    }).join('');
                    return `<tr>${tds}</tr>`;
                }).join('');

                return `<div class="audit-table-wrap"><table class="audit-table" aria-label="Detalii ${escapeHtml(cfg.label)}"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
            };

            const counts = audit.counts;
            auditPanelEl.style.display = 'block';
            auditPanelEl.innerHTML = `
                <h3>Audit Post-Crawl</h3>
                <div class="audit-table-wrap">
                    <table class="audit-table" aria-label="Rezultate audit post-crawl">
                        <thead>
                            <tr>
                                <th>Indicator</th>
                                <th>Ce inseamna</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Asset-uri lipsa</td>
                                <td>Resurse necesare paginii (CSS, JS, imagini, fonturi) care nu au fost gasite local in export.</td>
                                <td class="audit-count"><button type="button" class="audit-count-btn" data-audit-key="missingAssets">${counts.missingAssets}</button></td>
                            </tr>
                            <tr>
                                <td>Linkuri interne rupte</td>
                                <td>Linkuri catre pagini interne care nu exista in arhiva generata.</td>
                                <td class="audit-count"><button type="button" class="audit-count-btn" data-audit-key="brokenInternalLinks">${counts.brokenInternalLinks}</button></td>
                            </tr>
                            <tr>
                                <td>Redirectionari</td>
                                <td>URL-uri care au raspuns cu redirect catre o alta pagina (301/302 etc.).</td>
                                <td class="audit-count"><button type="button" class="audit-count-btn" data-audit-key="redirects">${counts.redirects}</button></td>
                            </tr>
                            <tr>
                                <td>MIME mismatch</td>
                                <td>Tipul de continut servit nu corespunde extensiei fisierului (ex: .css livrat ca alt tip).</td>
                                <td class="audit-count"><button type="button" class="audit-count-btn" data-audit-key="mimeMismatches">${counts.mimeMismatches}</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="audit-detail" id="auditDetail"></div>
                <div class="audit-legend">0 inseamna ca nu s-au detectat probleme pentru indicatorul respectiv.</div>
            `;

            const detailEl = auditPanelEl.querySelector('#auditDetail');
            const countButtons = auditPanelEl.querySelectorAll('.audit-count-btn');
            const showDetail = (key) => {
                const cfg = detailConfig[key];
                if (!cfg) return;

                selectedAuditCategory = key;

                countButtons.forEach((btn) => {
                    btn.classList.toggle('active', btn.dataset.auditKey === key);
                });

                detailEl.style.display = 'block';
                detailEl.innerHTML = `<h4>${escapeHtml(cfg.label)}</h4>${buildDetailTable(key)}`;
            };

            countButtons.forEach((btn) => {
                btn.addEventListener('click', () => {
                    showDetail(btn.dataset.auditKey || '');
                });
            });

            const initialCategory = detailConfig[selectedAuditCategory]
                ? selectedAuditCategory
                : 'missingAssets';
            showDetail(initialCategory);
        }

        async function refreshSavedRuns() {
            const response = await fetch('/api/runs');
            const data = await response.json();
            const runs = data.runs || [];
            savedRunsEl.innerHTML = '';

            if (runs.length === 0) {
                const li = document.createElement('li');
                li.textContent = 'Nu exista arhive salvate inca.';
                savedRunsEl.appendChild(li);
                return;
            }

            for (const run of runs.slice(0, 30)) {
                const li = document.createElement('li');
                const when = new Date(run.createdAt).toLocaleString();

                const left = document.createElement('span');
                if (run.webPath) {
                    const link = document.createElement('a');
                    link.href = run.webPath;
                    link.target = '_blank';
                    link.rel = 'noreferrer';
                    link.textContent = run.name;
                    left.appendChild(link);
                } else {
                    const plain = document.createElement('span');
                    plain.textContent = run.name;
                    left.appendChild(plain);

                    const badge = document.createElement('span');
                    badge.className = 'missing-index';
                    badge.textContent = 'incomplet (fara index.html)';
                    badge.style.marginLeft = '8px';
                    left.appendChild(badge);
                }

                const actions = document.createElement('span');
                actions.className = 'run-actions';

                const dateText = document.createElement('span');
                dateText.textContent = when;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'delete-btn';
                deleteBtn.type = 'button';
                deleteBtn.textContent = 'Delete';
                deleteBtn.addEventListener('click', async () => {
                    const ok = confirm(`Stergi arhiva "${run.name}"? Actiunea este permanenta.`);
                    if (!ok) return;

                    const deleteResponse = await fetch(`/api/runs/${encodeURIComponent(run.name)}`, { method: 'DELETE' });
                    const deleteData = await deleteResponse.json();
                    if (!deleteResponse.ok) {
                        resultEl.textContent = deleteData.error || 'Nu am putut sterge arhiva.';
                        return;
                    }

                    resultEl.textContent = `Arhiva ${run.name} a fost stearsa.`;
                    await refreshSavedRuns();
                });

                const zipLink = document.createElement('a');
                zipLink.className = 'zip-btn';
                zipLink.href = `/api/runs/${encodeURIComponent(run.name)}/zip`;
                zipLink.download = `${run.name}.zip`;
                zipLink.textContent = 'Download ZIP';

                actions.appendChild(dateText);
                actions.appendChild(zipLink);
                actions.appendChild(deleteBtn);
                li.appendChild(left);
                li.appendChild(actions);
                savedRunsEl.appendChild(li);
            }
        }

        async function refreshStatus() {
            if (shouldPauseAutoRerender()) {
                return;
            }

            const response = await fetch('/api/status');
            const status = await response.json();

            const currentSnapshot = {
                id: status.id || null,
                mode: status.mode || null,
                status: status.status || null,
            };

            const wasRunning = lastJobSnapshot
                && lastJobSnapshot.id
                && lastJobSnapshot.id === currentSnapshot.id
                && (lastJobSnapshot.status === 'running' || lastJobSnapshot.status === 'stopping');
            const isNowFinal = currentSnapshot.id
                && ['completed', 'failed', 'stopped'].includes(currentSnapshot.status);

            if (wasRunning && isNowFinal) {
                playJobFinishedSound(currentSnapshot);
            }
            lastJobSnapshot = currentSnapshot;

            if (!status.id) {
                statusEl.textContent = 'Niciun job activ.';
                stopBtn.style.display = 'none';
                exportLinksBtn.style.display = 'none';
                copyLogBtn.style.display = 'none';
                setStartButtonsEnabled(true);
                renderAudit(null);
                return;
            }

            statusEl.textContent = `Job #${status.id} - ${status.status}`;
            renderLogs(status.logs || []);
            stopBtn.style.display = (status.status === 'running' || status.status === 'stopping') ? 'inline-block' : 'none';
            copyLogBtn.style.display = (status.logs && status.logs.length > 0) ? 'inline-block' : 'none';

            if (status.status === 'running') {
                setStartButtonsEnabled(false);
                renderAudit(null);
                exportLinksBtn.style.display = 'none';
                if (status.mode === 'dry-run') {
                    resultEl.textContent = 'Dry run in executie...';
                } else if (status.input && status.input.singlePage) {
                    resultEl.textContent = 'Crawler in executie (single-page)...';
                } else {
                    resultEl.textContent = 'Crawler in executie...';
                }
            } else if (status.status === 'stopping') {
                setStartButtonsEnabled(false);
                resultEl.textContent = 'Oprire in curs...';
            } else if (status.status === 'completed' && status.result && status.mode === 'dry-run') {
                setStartButtonsEnabled(true);
                latestRecommendations = status.result.recommendations;
                latestDryRunLinks = Array.isArray(status.result.discoveredLinks) ? status.result.discoveredLinks : [];
                latestDryRunStartUrl = status.result.analyzedStartUrl || '';
                applyRecBtn.style.display = 'inline-block';
                exportLinksBtn.style.display = latestDryRunLinks.length > 0 ? 'inline-block' : 'none';
                renderDryStats(status.result);
                renderAudit(null);
                resultEl.textContent = 'Dry run finalizat. Poti aplica recomandarile in formular.';
            } else if (status.status === 'completed' && status.result) {
                setStartButtonsEnabled(true);
                exportLinksBtn.style.display = 'none';
                const counts = status.result.audit && status.result.audit.counts
                    ? status.result.audit.counts
                    : null;
                const auditSummary = counts
                    ? ` | Audit: asset-uri lipsa ${counts.missingAssets}, linkuri rupte ${counts.brokenInternalLinks}, redirectionari ${counts.redirects}, MIME mismatch ${counts.mimeMismatches}`
                    : '';
                const logLink = status.result.logWebPath
                    ? ` | <a href="${status.result.logWebPath}" target="_blank" rel="noreferrer">Log text</a>`
                    : '';
                resultEl.innerHTML = `Terminat: ${status.result.totalVisited} pagini, ${status.result.totalFailed} erori.${auditSummary} <a href="${status.result.webPath}" target="_blank" rel="noreferrer">Deschide arhiva</a>${logLink}`;
                const runHtmlBase = status.result.webPath
                    ? status.result.webPath.replace(/[^/]+$/, '')
                    : '';
                const startUrl = status.input && status.input.targetUrl
                    ? status.input.targetUrl
                    : '';
                renderAudit(status.result.audit || null, { runHtmlBase, startUrl });
            } else if (status.status === 'stopped' && status.result) {
                setStartButtonsEnabled(true);
                exportLinksBtn.style.display = 'none';
                renderAudit(null);
                resultEl.textContent = `Job oprit manual: ${status.result.error}`;
            } else if (status.status === 'failed' && status.result) {
                setStartButtonsEnabled(true);
                exportLinksBtn.style.display = 'none';
                renderAudit(null);
                resultEl.textContent = `Job esuat: ${status.result.error}`;
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const payload = payloadFromForm();
            resultEl.textContent = '';
            primeAudioContext();

            const delayError = validateCrawlDelays(payload.delayMinMs, payload.delayMaxMs);
            if (delayError) {
                resultEl.textContent = delayError;
                return;
            }

            setStartButtonsEnabled(false);
            await submitCrawl(payload);
        });

        dryRunBtn.addEventListener('click', async () => {
            const base = payloadFromForm();
            primeAudioContext();
            latestRecommendations = null;
            latestDryRunLinks = [];
            latestDryRunStartUrl = '';
            applyRecBtn.style.display = 'none';
            exportLinksBtn.style.display = 'none';
            dryStatsEl.style.display = 'none';
            resultEl.textContent = '';

            const response = await fetch('/api/dry-run', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({
                    targetUrl: base.targetUrl,
                    delayMinMs: 120,
                    delayMaxMs: 260,
                    crawlDelayMinMs: base.delayMinMs,
                    crawlDelayMaxMs: base.delayMaxMs,
                    respectRobots: base.respectRobots,
                    saveExternalAssets: false,
                    maxPagesProbe: 180,
                    maxDepthProbe: 6,
                }),
            });

            const data = await response.json();
            if (!response.ok) {
                resultEl.textContent = data.error || 'Nu am putut porni dry run.';
                setStartButtonsEnabled(true);
                return;
            }

            setStartButtonsEnabled(false);
            statusEl.textContent = 'Dry run pornit...';
            await refreshStatus();
        });

        applyRecBtn.addEventListener('click', () => {
            if (!latestRecommendations) return;
            document.getElementById('maxPages').value = latestRecommendations.maxPages;
            document.getElementById('maxDepth').value = latestRecommendations.maxDepth;
            resultEl.textContent = 'Recomandarile au fost aplicate in formular.';
        });

        copyLogBtn.addEventListener('click', copyLogsToClipboard);
        exportLinksBtn.addEventListener('click', exportDiscoveredLinks);
        notifySoundInput.addEventListener('change', saveSoundPreference);
        notifyVolumeInput.addEventListener('change', saveSoundPreference);

        stopBtn.addEventListener('click', async () => {
            const response = await fetch('/api/stop', { method: 'POST' });
            const data = await response.json();
            if (!response.ok) {
                resultEl.textContent = data.message || 'Nu exista job activ de oprit.';
                return;
            }
            resultEl.textContent = data.message;
            await refreshStatus();
        });

        singlePageInput.addEventListener('change', syncSinglePageBadge);
        logsEl.addEventListener('mousedown', () => bumpSelectionHold(3000));
        logsEl.addEventListener('mouseup', () => bumpSelectionHold(3000));
        logsEl.addEventListener('keyup', () => bumpSelectionHold(3000));
        auditPanelEl.addEventListener('mousedown', () => bumpSelectionHold(3000));
        auditPanelEl.addEventListener('mouseup', () => bumpSelectionHold(3000));
        auditPanelEl.addEventListener('keyup', () => bumpSelectionHold(3000));
        document.addEventListener('selectionchange', () => {
            if (hasSelectionInside(logsEl) || hasSelectionInside(auditPanelEl)) {
                bumpSelectionHold(3000);
            }
        });

        syncSinglePageBadge();
        loadSoundPreference();
        refreshStatus();
        refreshSavedRuns();
        setInterval(refreshStatus, 2000);
        setInterval(refreshSavedRuns, 8000);
    </script>
</body>

</html>
